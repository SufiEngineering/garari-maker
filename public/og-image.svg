<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Garari Maker — Free Sprocket & Gear DXF Generator">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160a0a"/>
      <stop offset="1" stop-color="#0c0606"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="30%" r="60%">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- decorative sprocket -->
  <g transform="translate(930,315)" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.9">
    <circle r="210" stroke-dasharray="4 12" opacity="0.4"/>
    <circle r="165" stroke="#f87171"/>
    <circle r="95" stroke="#fbbf24" opacity="0.8"/>
    <circle r="40" stroke="#fb7185"/>
    <g stroke="#ef4444" stroke-width="14" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="-175" x2="0" y2="-205"/>
      <line x1="124" y1="-124" x2="145" y2="-145"/>
      <line x1="175" y1="0" x2="205" y2="0"/>
      <line x1="124" y1="124" x2="145" y2="145"/>
      <line x1="0" y1="175" x2="0" y2="205"/>
      <line x1="-124" y1="124" x2="-145" y2="145"/>
      <line x1="-175" y1="0" x2="-205" y2="0"/>
      <line x1="-124" y1="-124" x2="-145" y2="-145"/>
    </g>
  </g>

  <!-- logo + wordmark -->
  <g transform="translate(90,150)">
    <rect width="84" height="84" rx="20" fill="url(#logo)"/>
    <text x="42" y="60" font-family="system-ui, Arial, sans-serif" font-size="52" font-weight="900" fill="#fff" text-anchor="middle">G</text>
    <text x="110" y="38" font-family="system-ui, Arial, sans-serif" font-size="34" font-weight="800" fill="#f5efef">Garari Maker</text>
    <text x="112" y="70" font-family="system-ui, Arial, sans-serif" font-size="18" letter-spacing="3" fill="#b5a6a6">BY SUFI ENGINEERING</text>
  </g>

  <!-- headline -->
  <g font-family="system-ui, Arial, sans-serif" fill="#f5efef">
    <text x="90" y="320" font-size="66" font-weight="800">Free Sprocket &amp; Gear</text>
    <text x="90" y="392" font-size="66" font-weight="800">DXF Generator</text>
    <text x="92" y="450" font-size="27" fill="#b5a6a6">ANSI + ISO · 2D/3D preview · DXF &amp; STL export · in your browser</text>
  </g>

  <!-- pill -->
  <g transform="translate(90,500)">
    <rect width="360" height="58" rx="29" fill="#ef4444"/>
    <text x="180" y="38" font-family="system-ui, Arial, sans-serif" font-size="24" font-weight="800" fill="#fff" text-anchor="middle">Launch the App →</text>
  </g>
</svg>
